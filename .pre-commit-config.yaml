# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# excel-agent-tools Pre-commit Configuration
# Phase 14 Hardening: Security & Quality Gates

repos:
  # Standard hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-executables-have-shebangs

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  # Python formatting (black)
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.12
        args: ['--line-length=99']

  # Python linting (ruff)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: ['--line-length=99', '--select=E,F,I,N,W,UP,S,B,SIM,RUF']

  # Python type checking (mypy)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - openpyxl>=3.1.5
          - pandas>=2.1.0
          - jsonschema>=4.23.0
          - types-defusedxml>=0.7.0
          - types-jsonschema>=4.23.0
          - types-openpyxl>=3.1.0
        args: ['--strict', '--show-error-codes']

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: ['--fix', '--ignore=CHANGELOG.md']
